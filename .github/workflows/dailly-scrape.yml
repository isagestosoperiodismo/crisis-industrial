name: Scraper diario - despidos conurbano

on:
  schedule:
    # Todos los dias a las 8am hora Argentina (UTC-3 -> 11:00 UTC)
    - cron: "0 11 * * *"
  # Permite correr manualmente desde la UI de GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Correr scraper
        run: node scraper/scraper.mjs

      - name: Commit y push si hay cambios
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/por_verificar.csv
          git diff --staged --quiet || git commit -m "Scraper: nuevas noticias $(date +'%d/%m/%Y')"
          git push